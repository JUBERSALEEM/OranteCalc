<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academic CV Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Open Sans', sans-serif;
            font-size: 10px;
            line-height: 1.6;
            color: #000;
            background: #fff;
            padding: 30px;
            max-width: 210mm;
            margin: 0 auto;
        }

        .resume-header {
            text-align: center;
            border-bottom: 2px solid #000;
            padding-bottom: 15px;
            margin-bottom: 20px;
        }

        .resume-name {
            font-family: 'Libre Baskerville', serif;
            font-size: 20px;
            font-weight: 700;
        }

        .resume-title {
            font-size: 11px;
            margin-top: 5px;
        }

        .resume-contact {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 10px;
            font-size: 9px;
        }

        .resume-section {
            margin-bottom: 20px;
        }

        .resume-section-title {
            font-family: 'Libre Baskerville', serif;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            border-bottom: 1px solid #000;
            padding-bottom: 3px;
            margin-bottom: 12px;
        }

        .resume-item {
            margin-bottom: 12px;
            padding-left: 15px;
            border-left: 2px solid #ccc;
        }

        .resume-company {
            font-weight: 600;
            font-size: 10px;
        }

        .resume-date {
            font-size: 9px;
            color: #666;
        }

        .resume-publications {
            font-size: 9px;
        }

            .resume-publications li {
                margin-bottom: 5px;
            }
    </style>
</head>
<body>
    <div class="resume-header">
        <div class="resume-name" id="resumeName">DR. YOUR NAME</div>
        <div class="resume-title">Professor / Researcher</div>
        <div class="resume-contact">
            <span id="resumeEmail">email@university.edu</span>
            <span>•</span>
            <span id="resumePhone">+1 234 567 890</span>
            <span>•</span>
            <span>scholar.google.com</span>
        </div>
    </div>

    <div class="resume-section">
        <div class="resume-section-title">Education</div>
        <div id="resumeEducation">
            <div class="resume-item">
                <div class="resume-company">Ph.D. in Field</div>
                <div class="resume-date">University Name • 2020</div>
            </div>
        </div>
    </div>

    <div class="resume-section">
        <div class="resume-section-title">Research Experience</div>
        <div id="resumeExperience">
            <div class="resume-item">
                <div class="resume-company">University / Institute</div>
                <div class="resume-date">2020 - Present</div>
            </div>
        </div>
    </div>

    <div class="resume-section">
        <div class="resume-section-title">Publications</div>
        <ul class="resume-publications" id="resumePublications">
            <li>Paper 1 (2023)</li>
            <li>Paper 2 (2022)</li>
        </ul>
    </div>

    <div class="resume-section">
        <div class="resume-section-title">Skills</div>
        <div id="resumeSkills">Research Methods, Data Analysis, etc.</div>
    </div>
</body>
</html>
