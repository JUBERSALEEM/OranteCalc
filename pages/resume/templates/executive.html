<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Executive Resume Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            font-size: 11px;
            line-height: 1.6;
            color: #1a1a1a;
            background: #fff;
            padding: 40px;
            max-width: 210mm;
            margin: 0 auto;
            border: 3px solid #1a1a1a;
        }

        .resume-header {
            text-align: center;
            padding-bottom: 20px;
            border-bottom: 1px solid #1a1a1a;
            margin-bottom: 20px;
        }

        .resume-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: #1a1a1a;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .resume-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-top: 5px;
        }

        .resume-contact {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 10px;
        }

        .resume-section {
            margin-bottom: 20px;
        }

        .resume-section-title {
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 5px;
            margin-bottom: 12px;
        }

        .resume-item {
            margin-bottom: 15px;
            padding-left: 15px;
            border-left: 2px solid #1a1a1a;
        }

        .resume-company {
            font-weight: 600;
            font-size: 12px;
        }

        .resume-date {
            font-size: 10px;
            color: #666;
        }

        .resume-skills {
            text-align: center;
        }

        .resume-skill {
            display: inline-block;
            background: #1a1a1a;
            color: #fff;
            padding: 4px 12px;
            margin: 3px;
            border-radius: 0;
            font-size: 10px;
        }
    </style>
</head>
<body>
    <div class="resume-header">
        <div class="resume-name" id="resumeName">YOUR FULL NAME</div>
        <div class="resume-title" id="resumeTitle">SENIOR EXECUTIVE</div>
        <div class="resume-contact">
            <span id="resumeEmail">email@example.com</span>
            <span id="resumePhone">+971 50 123 4567</span>
            <span id="resumeLinkedin">linkedin.com/in/yourname</span>
        </div>
    </div>

    <div class="resume-section">
        <div class="resume-section-title">Executive Summary</div>
        <div id="resumeSummary">Results-driven executive...</div>
    </div>

    <div class="resume-section">
        <div class="resume-section-title">Professional Experience</div>
        <div id="resumeExperience">
            <div class="resume-item">
                <div class="resume-company">Company Name</div>
                <div class="resume-date">2020 - Present</div>
                <div>Executive responsibilities...</div>
            </div>
        </div>
    </div>

    <div class="resume-section">
        <div class="resume-section-title">Core Competencies</div>
        <div class="resume-skills" id="resumeSkills">
            <span class="resume-skill">Leadership</span>
            <span class="resume-skill">Strategy</span>
        </div>
    </div>
</body>
</html>
