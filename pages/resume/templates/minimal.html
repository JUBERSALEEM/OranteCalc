<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Resume Template</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; font-size: 10px; line-height: 1.5; color: #000; background: #fff; padding: 25px; max-width: 210mm; margin: 0 auto; }
        
        .resume-name { font-size: 16px; font-weight: 600; }
        .resume-title { font-size: 11px; color: #666; margin-bottom: 10px; }
        .resume-contact { display: flex; gap: 10px; margin-bottom: 20px; font-size: 9px; color: #666; }
        
        .resume-section { margin-bottom: 15px; }
        .resume-section-title { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        
        .resume-item { margin-bottom: 10px; }
        .resume-company { font-weight: 600; font-size: 10px; }
        .resume-date { color: #999; font-size: 9px; display: block; margin-top: 2px; }
        .resume-description { margin-top: 5px; }
    </style>
</head>
<body>
    <div>
        <div class="resume-name" id="resumeName">YOUR NAME</div>
        <div class="resume-title" id="resumeTitle">Professional Title</div>
        <div class="resume-contact">
            <span id="resumeEmail">email@example.com</span>
            <span>•</span>
            <span id="resumePhone">+971 50 123 4567</span>
            <span>•</span>
            <span id="resumeLinkedin">linkedin.com</span>
        </div>
        
        <div class="resume-section">
            <div class="resume-section-title">Summary</div>
            <div id="resumeSummary">Professional summary goes here...</div>
        </div>
        
        <div class="resume-section">
            <div class="resume-section-title">Experience</div>
            <div id="resumeExperience">
                <div class="resume-item">
                    <div class="resume-company">Company Name</div>
                    <div class="resume-date">Jan 2020 - Present</div>
                    <div class="resume-description">Job description...</div>
                </div>
            </div>
        </div>
        
        <div class="resume-section">
            <div class="resume-section-title">Education</div>
            <div id="resumeEducation">
                <div class="resume-item">
                    <div class="resume-company">University Name</div>
                    <div class="resume-date">Bachelor's Degree • 2020</div>
                </div>
            </div>
        </div>
        
        <div class="resume-section">
            <div class="resume-section-title">Skills</div>
            <div id="resumeSkills">Skill 1, Skill 2, Skill 3</div>
        </div>
    </div>
</body>
</html>
