<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us | Orante Calc</title>
    <meta name="description" content="Contact Orante Calc - Get in touch with our team">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <nav class="navbar">
        <div class="container">
            <a href="index.html" class="logo">
                <i class="fa-solid fa-calculator"></i> Orante Calc
            </a>
            <button class="mobile-menu-btn" onclick="toggleMobileMenu()">
                <i class="fa-solid fa-bars"></i>
            </button>
            <ul class="nav-links" id="navLinks">
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="contact.html" class="active">Contact</a></li>
                <li><a href="faq.html">FAQ</a></li>
                <li><a href="pricing.html">Pricing</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero" style="padding: 80px 0;">
        <div class="container hero-content">
            <h1>Contact <span class="text-gradient">Us</span></h1>
            <p>Have questions? We'd love to hear from you.</p>
        </div>
    </header>

    <section class="page-content">
        <div class="container">
            <div class="calculator-layout">
                <div class="calc-form">
                    <h2><i class="fa-solid fa-envelope"></i> Send Message</h2>
                    <form>
                        <div class="form-group">
                            <label>Your Name</label>
                            <input type="text" class="form-control" placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-control" placeholder="john@example.com">
                        </div>
                        <div class="form-group">
                            <label>Subject</label>
                            <select class="form-control">
                                <option>General Inquiry</option>
                                <option>Technical Support</option>
                                <option>Feedback</option>
                                <option>Partnership</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Message</label>
                            <textarea class="form-control" rows="5" placeholder="Your message here..."></textarea>
                        </div>
                        <button type="button" class="btn btn-primary">
                            <i class="fa-solid fa-paper-plane"></i> Send Message
                        </button>
                    </form>
                </div>

                <div class="result-card">
                    <h3><i class="fa-solid fa-headset"></i> Contact Info</h3>
                    <div class="result-row">
                        <span class="label">Email</span>
                        <span class="value">hello@orantecalc.com</span>
                    </div>
                    <div class="result-row">
                        <span class="label">Response Time</span>
                        <span class="value text-primary">24-48 Hours</span>
                    </div>
                    <div class="result-row">
                        <span class="label">Social</span>
                        <span class="d-flex gap-2">
                            <a href="#"><i class="fa-brands fa-twitter"></i></a>
                            <a href="#"><i class="fa-brands fa-linkedin"></i></a>
                            <a href="#"><i class="fa-brands fa-instagram"></i></a>
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2024 Orante Calc. All Rights Reserved.</p>
            </div>
        </div>
    </footer>

    <script src="js/main.js"></script>
</body>
</html>
